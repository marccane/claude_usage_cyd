; Claude.ai usage monitor for the CYD (Cheap Yellow Display, ESP32-2432S028 v2/v3)
;
;   pipx install platformio       # pio isn't on your PATH yet
;   pio run -t upload && pio device monitor
;
; Display: this is configured for the ST7789 panel found on the 2-USB / USB-C
; CYD revision. If your screen is blank, garbled, or colour-inverted, see the
; "DISPLAY DRIVER" block below — switching to ILI9341 is two lines.

[env:cyd]
platform = espressif32@^6.6.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = huge_app.csv   ; LVGL + TLS + TFT_eSPI is a big binary

lib_deps =
    lvgl/lvgl@^8.4.0
    bodmer/TFT_eSPI@^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    bblanchon/ArduinoJson@^7.2.0

build_flags =
    ; ---------- LVGL ----------
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
    ; ---------- TFT_eSPI: bus + pins (CYD) ----------
    -D USER_SETUP_LOADED
    -D USE_HSPI_PORT            ; TFT is wired to the HSPI pins; touch gets VSPI
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    ; ---------- DISPLAY DRIVER (CYD v2/v3 = ST7789) ----------
    ; If the screen is wrong, comment these 3 lines and uncomment the ILI9341 line.
    -D ST7789_DRIVER
    -D TFT_RGB_ORDER=TFT_BGR    ; ST7789 CYD is usually BGR; flip to TFT_RGB if colours look swapped
    -D TFT_INVERSION_OFF        ; this panel needs inversion OFF (with ON, black rendered as white)
    ; -D ILI9341_2_DRIVER       ; <-- classic single-microUSB CYD: use THIS instead of the 3 above
    ; ---------- fonts ----------
    -D LOAD_GLCD
    -D LOAD_FONT2
    -D LOAD_FONT4
    -D LOAD_GFXFF
    -D SMOOTH_FONT
    ; ---------- SPI speeds ----------
    -D SPI_FREQUENCY=55000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000
